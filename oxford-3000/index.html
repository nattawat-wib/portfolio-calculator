<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OXF3000</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="https://d35aaqx5ub95lt.cloudfront.net/favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Oxford 3000</h1>
      <p class="subtitle">Flashcard Practice</p>
    </header>

    <div class="top-credit">
      <a href="../" class="top-credit-back">← Back to portal</a>
      <span class="top-credit-text">2026 · made by <a href="https://github.com/nattawat-wib" target="_blank" rel="noopener">nutella_wib</a></span>
    </div>

    <div class="top-bar">
      <div class="stats">
        <span id="cardCount">0 / 0</span>
        <span class="stat-separator">|</span>
        <span>Known: <span id="knownCount">0</span></span>
      </div>
      <div class="top-bar-actions">
        <button class="theme-btn" id="themeBtn"><i class="fa-regular fa-moon"></i></button>
        <button class="mute-top-btn" id="muteBtn" aria-label="Toggle sound effects"><i class="fa-solid fa-volume-high"></i></button>
        <button class="menu-btn" id="menuBtn" aria-label="Open settings"><i class="fa-solid fa-bars"></i></button>
      </div>
    </div>

    <div class="desktop-controls" id="desktopControls">
      <div class="controls">
        <div class="level-filter">
          <label>Level:</label>
          <select id="levelSelect">
            <option value="all">All Levels</option>
            <option value="A1">A1 (Beginner)</option>
            <option value="A2">A2 (Elementary)</option>
            <option value="B1">B1 (Intermediate)</option>
            <option value="B2">B2 (Upper Intermediate)</option>
          </select>
        </div>
        <div class="control-buttons">
          <button id="shuffleBtn" class="btn btn-secondary">Shuffle</button>
          <button id="resetBtn" class="btn btn-secondary">Reset Progress</button>
        </div>
      </div>
    </div>

    <div class="card-wrapper">
      <div class="card" id="flashCard">
        <div class="card-inner">
          <div class="card-front">
            <span class="card-level" id="cardLevel">A1</span>
            <p class="card-word" id="wordDisplay">word</p>
            <p class="card-pos-front" id="posFrontDisplay"></p>
            <p class="card-hint">Tap or click to flip</p>
          </div>
          <div class="card-back">
            <p class="card-label">Definition</p>
            <p class="card-definition" id="definitionDisplay">definition</p>
            <p class="card-thai" id="thaiDisplay">แปลภาษาไทย</p>
            <p class="card-label example-label">Example</p>
            <p class="card-example" id="exampleDisplay">example sentence</p>
            <p class="card-thai-example" id="thaiExampleDisplay"></p>
          </div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="speak-action-btn" id="speakBtn" aria-label="Listen to pronunciation"><i class="fa-solid fa-volume-high"></i></button>
      <button id="dontKnowBtn" class="btn btn-outline">Don't Know</button>
      <button id="knowBtn" class="btn btn-primary">Know</button>
    </div>

    <div class="empty-state" id="emptyState">
      <p>No cards match the selected level.</p>
      <button id="resetFromEmptyBtn" class="btn btn-secondary">Reset Filter</button>
    </div>

    <div class="dontknow-section" id="dontknowSection">
      <div class="dontknow-header" id="dontknowToggle">
        <span>Don't Know List</span>
        <span class="dontknow-count" id="dontknowCount">0</span>
        <span class="dontknow-arrow">▶</span>
      </div>
      <div class="dontknow-body" id="dontknowBody">
        <ul class="dontknow-list" id="dontknowList"></ul>
        <div class="dontknow-actions">
          <button id="copyBtn" class="btn btn-secondary">📋 Copy All</button>
          <button id="clearDontknowBtn" class="btn btn-secondary">Clear</button>
        </div>
      </div>
    </div>

    <div class="side-overlay" id="sideOverlay">
      <div class="side-panel">
        <div class="side-header">
          <span class="side-title">Settings</span>
          <button class="side-close" id="sideClose"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="stats">
          <span id="sideCardCount">0 / 0</span>
          <span class="stat-separator">|</span>
          <span>Known: <span id="sideKnownCount">0</span></span>
        </div>
        <div class="controls">
          <div class="level-filter">
            <label>Level:</label>
            <select id="sideLevelSelect">
              <option value="all">All Levels</option>
              <option value="A1">A1 (Beginner)</option>
              <option value="A2">A2 (Elementary)</option>
              <option value="B1">B1 (Intermediate)</option>
              <option value="B2">B2 (Upper Intermediate)</option>
            </select>
          </div>
          <div class="control-buttons">
            <button id="sideShuffleBtn" class="btn btn-secondary">Shuffle</button>
            <button id="sideResetBtn" class="btn btn-secondary">Reset Progress</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
